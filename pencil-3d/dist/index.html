<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>🌌 Pencil Universe</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🎛️ Controls -->
  <div id="controls">

    <div class="control-group">
      <label>✏️ Size</label>
      <input type="range" id="pencilSize" min="1" max="30" value="5">
    </div>

    <div class="control-group">
      <label>🎨 Color</label>
      <input type="color" id="pencilColor" value="#ffffff">
    </div>

  </div>
<button onclick="undo()">Undo</button>
<button onclick="redo()">Redo</button>
  <!-- 🌌 Canvas -->
  <canvas id="canvas"></canvas>

  <script src="script.js"></script>
</body>

</html>
